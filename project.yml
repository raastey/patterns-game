name: PatternPath
options:
  bundleIdPrefix: fun.raastey
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: true
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    INFOPLIST_KEY_CFBundleDisplayName: Pattern Path
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    DEVELOPMENT_TEAM: P3UCBA6NAQ
targets:
  PatternPath:
    type: application
    platform: iOS
    sources:
      - path: PatternPath
        excludes:
          - Resources/Sounds/**
          - PrivacyInfo.xcprivacy
      - path: PatternPath/Resources/Sounds
        buildPhase: resources
        excludes:
          - LICENSE-AUDIO-UISFX.txt
      - path: PatternPath/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fun.raastey.patternpath
        DEVELOPMENT_TEAM: P3UCBA6NAQ
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_CFBundleDisplayName: Pattern Path
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: PatternPath/Info.plist
      properties:
        CFBundleDisplayName: Pattern Path
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
